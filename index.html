<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akciju Navigators PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; }
        
        .product-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card:hover { transform: scale(1.05); z-index: 50; }
        
        .img-zoom { transition: transform 0.5s ease; }
        .product-card:hover .img-zoom { transform: scale(1.2); }

        .price-badge {
            font-family: 'Oswald', sans-serif;
            background: #ffed00;
            color: #0050aa;
            padding: 8px 15px;
            box-shadow: 4px 4px 0px #0050aa;
        }
        .Rimi .price-badge { background: #e30613; color: white; box-shadow: 4px 4px 0px #000; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-900 text-slate-900 mb-6 tracking-tighter">
                🛒 <span class="bg-blue-600 text-white px-4 py-1 rounded-2xl">Akciju</span> Navigators
            </h1>
            <input type="text" id="q" oninput="draw()" placeholder="Meklēt produktu..." 
                class="w-full max-w-xl p-5 rounded-3xl shadow-2xl border-none focus:ring-4 focus:ring-blue-200 text-xl outline-none transition-all">
            <div id="status" class="mt-4 text-slate-400 text-sm"></div>
        </div>

        <div id="list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </div>

<script>
    let db = [];
    async function init() {
        const r = await fetch('data.json?v=' + Date.now());
        const d = await r.json();
        db = d.items || [];
        document.getElementById('status').innerText = `Atrastas ${db.length} akcijas • ${new Date(d.updatedAt).toLocaleTimeString()}`;
        draw();
    }

    function draw() {
        const q = document.getElementById('q').value.toLowerCase();
        const container = document.getElementById('list');
        const filtered = db.filter(i => i.name.toLowerCase().includes(q));

        container.innerHTML = filtered.map(i => `
            <div class="product-card bg-white rounded-[2rem] p-6 shadow-lg flex flex-col justify-between ${i.store}">
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black uppercase tracking-tighter opacity-30">${i.store}</span>
                        <span class="text-[10px] text-slate-400 font-bold italic">📅 ${i.date}</span>
                    </div>
                    <div class="overflow-hidden rounded-2xl h-48 mb-6 bg-slate-50 flex items-center justify-center">
                        <img src="${i.img || 'https://via.placeholder.com/300'}" class="img-zoom max-h-full object-contain">
                    </div>
                    <h3 class="text-lg font-bold text-slate-800 leading-snug mb-2">${i.name}</h3>
                </div>
                <div class="flex justify-between items-end mt-4">
                    <span class="text-xs text-slate-400 font-bold uppercase">${i.unit}</span>
                    <div class="price-badge text-4xl font-black">${i.price}€</div>
                </div>
            </div>
        `).join('');
    }
    init();
</script>
</body>
</html>
