<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akciju Navigators</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f1f5f9; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        .search-box { position: sticky; top: 10px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 100; margin-bottom: 20px; }
        input { width: 100%; border: none; font-size: 18px; outline: none; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border-left: 6px solid #ddd; }
        .Rimi { border-color: #e30613; } .Maxima { border-color: #004a99; } .Lidl { border-color: #0050aa; }
        .store { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; }
        .name { font-weight: 600; color: #1e293b; display: block; }
        .price { font-size: 20px; font-weight: 900; color: #000; }
    </style>
</head>
<body>
<div class="container">
    <div class="search-box">
        <input type="text" id="q" placeholder="Ko meklējat? (piem. kafija)" oninput="draw()">
    </div>
    <div id="list"></div>
</div>
<script>
    let db = [];
    async function init() {
        const r = await fetch('data.json?v=' + Date.now());
        const d = await r.json();
        db = d.items;
        draw();
    }
    function draw() {
        const q = document.getElementById('q').value.toLowerCase();
        document.getElementById('list').innerHTML = db.filter(i => i.name.toLowerCase().includes(q) || i.store.toLowerCase().includes(q))
            .map(i => `<div class="card ${i.store}"><div><span class="store">${i.store}</span><span class="name">${i.name}</span></div><div class="price">${i.price}€</div></div>`).join('');
    }
    init();
</script>
</body>
</html>
