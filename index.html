<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akciju Navigators</title>
    <style>
        :root { --rimi: #e30613; --maxima: #004a99; --lidl: #0050aa; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f1f5f9; margin: 0; padding: 15px; color: #1e293b; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .header { text-align: center; padding: 20px 0; }
        .search-box { position: sticky; top: 10px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 100; margin-bottom: 20px; }
        input { width: 100%; border: none; font-size: 18px; outline: none; background: transparent; }

        .card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border-left: 8px solid #ddd; }
        .card.Rimi { border-color: var(--rimi); }
        .card.Maxima { border-color: var(--maxima); }
        .card.Lidl { border-color: var(--lidl); }

        .store-tag { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 4px; display: block; }
        .p-name { font-weight: 700; color: #1e293b; font-size: 15px; line-height: 1.3; }
        .p-price { font-size: 24px; font-weight: 900; color: #000; min-width: 80px; text-align: right; }
        
        #status-msg { text-align: center; font-size: 14px; color: #64748b; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-size:24px;">🛍️ Akciju Navigators</h1>
        <p style="margin:5px 0; font-size:14px; color:#64748b;">Visas akcijas vienā meklētājā</p>
    </div>

    <div class="search-box">
        <input type="text" id="q" placeholder="Ko meklējat? (piem. kafija)" oninput="draw()">
    </div>

    <div id="status-msg">Ielādē datus...</div>
    <div id="list"></div>
</div>

<script>
    let db = [];

    async function init() {
        const msg = document.getElementById('status-msg');
        try {
            // Ielādējam datus
            const r = await fetch('data.json?v=' + Date.now());
            if (!r.ok) throw new Error();
            const d = await r.json();
            
            db = d.items || [];
            msg.innerText = `Atrastas ${db.length} aktuālas akcijas`;
            
            // Ja datu nav, parādām instrukciju
            if (db.length === 0) {
                msg.innerHTML = "⚠️ Akcijas vēl nav savāktas. <br>Lūdzu, palaidiet <b>Run workflow</b> savā GitHub profilā!";
            }

            draw();
        } catch (e) {
            msg.innerText = "❌ Kļūda ielādējot data.json. Vai robots ir palaists?";
        }
    }

    function draw() {
        const q = document.getElementById('q').value.toLowerCase();
        const listDiv = document.getElementById('list');
        
        const filtered = db.filter(i => 
            i.name.toLowerCase().includes(q) || 
            i.store.toLowerCase().includes(q)
        );

        listDiv.innerHTML = filtered.map(i => `
            <div class="card ${i.store}">
                <div style="flex: 1; padding-right: 15px;">
                    <span class="store-tag">${i.store}</span>
                    <span class="p-name">${i.name}</span>
                </div>
                <div class="p-price">${i.price}${i.price.includes('€') ? '' : '€'}</div>
            </div>
        `).join('');

        if (filtered.length === 0 && db.length > 0) {
            listDiv.innerHTML = '<p style="text-align:center; color:#64748b; margin-top:40px;">Neko neatradām. <br>Mēģiniet citu vārdu (piemēram, "piens").</p>';
        }
    }

    init();
</script>

</body>
</html>
