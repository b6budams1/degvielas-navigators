<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akciju Navigators</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .product-card { transition: all 0.4s ease; border-radius: 24px; overflow: hidden; }
        .product-card:hover { transform: translateY(-8px) scale(1.02); z-index: 50; }
        .price-box {
            font-family: 'Oswald', sans-serif;
            background: #ffed00; color: #0050aa;
            padding: 8px 12px; box-shadow: 4px 4px 0px #0050aa;
            transform: rotate(-1deg);
        }
        .Rimi .price-box { background: #e30613; color: white; box-shadow: 4px 4px 0px #000; }
        .Maxima .price-box { background: #004a99; color: white; box-shadow: 4px 4px 0px #ffed00; }
        .img-zoom { transition: transform 0.6s ease; }
        .product-card:hover .img-zoom { transform: scale(1.1); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-900 mb-6 flex justify-center items-center gap-3">
                <span class="bg-blue-600 text-white px-5 py-1 rounded-2xl rotate-[-2deg]">AKCIJU</span>
                <span class="tracking-tight">NAVIGATORS</span>
            </h1>
            <input type="text" id="q" oninput="draw()" placeholder="Meklēt kafiju, pienu vai veikalu..." 
                class="w-full max-w-xl p-6 bg-white rounded-[2rem] shadow-2xl border-none outline-none focus:ring-4 focus:ring-blue-100 text-xl transition-all">
        </div>
        <div id="list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </div>

<script>
    let db = [];
    async function init() {
        const r = await fetch('data.json?v=' + Date.now());
        const d = await r.json();
        db = d.items || [];
        draw();
    }
    function draw() {
        const q = document.getElementById('q').value.toLowerCase();
        const filtered = db.filter(i => i.name.toLowerCase().includes(q) || i.store.toLowerCase().includes(q));
        document.getElementById('list').innerHTML = filtered.map(i => `
            <div class="product-card bg-white p-5 shadow-lg flex flex-col justify-between ${i.store}">
                <div class="flex justify-between items-center mb-4 text-[10px] font-bold">
                    <span class="bg-slate-100 px-2 py-1 rounded text-slate-500 uppercase">${i.store}</span>
                    <span class="text-slate-300">📅 ${i.date}</span>
                </div>
                <div class="h-40 flex items-center justify-center mb-4 overflow-hidden rounded-xl bg-slate-50">
                    <img src="${i.img || 'https://via.placeholder.com/200'}" class="img-zoom max-h-full object-contain">
                </div>
                <div class="flex justify-between items-end gap-2">
                    <div class="flex-1">
                        <h3 class="text-sm font-bold text-slate-800 leading-tight mb-1 h-10 line-clamp-2">${i.name}</h3>
                        <p class="text-[10px] text-slate-400 font-bold">${i.unit || ''}</p>
                    </div>
                    <div class="price-box text-2xl font-black">${i.price}€</div>
                </div>
            </div>
        `).join('');
    }
    init();
</script>
</body>
</html>
