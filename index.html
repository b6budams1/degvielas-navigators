<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elektrības Luksofors</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f1f5f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app { max-width: 450px; width: 100%; }
        .main-card { background: white; border-radius: 24px; padding: 30px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; transition: 0.5s; }
        .status-dot { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 20px; border: 8px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .current-price { font-size: 48px; font-weight: 900; margin: 10px 0; color: #1e293b; }
        .unit { font-size: 18px; color: #64748b; font-weight: normal; }
        .advice { font-size: 18px; font-weight: 600; color: #334155; margin-top: 15px; }
        .forecast { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .hour-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .hour-row:last-child { border: none; }
        .hour-time { font-weight: bold; color: #1e293b; }
        .hour-price { padding: 4px 12px; border-radius: 12px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
<div class="app">
    <div id="main-ui" class="main-card">
        <div id="status-dot" class="status-dot" style="background: #e2e8f0;"></div>
        <div id="status-text" style="text-transform: uppercase; font-weight: 800; letter-spacing: 1px; color: #64748b;">Ielādē...</div>
        <div class="current-price"><span id="price-now">--.--</span> <span class="unit">c/kWh</span></div>
        <div id="advice-text" class="advice">Lūdzu, uzgaidiet...</div>
    </div>

    <div class="forecast">
        <h3 style="margin-top:0; font-size:16px; color:#64748b;">Prognoze tuvākajām stundām</h3>
        <div id="forecast-list"></div>
    </div>
    <p id="update-time" style="text-align:center; font-size:11px; color:#94a3b8; margin-top:15px;"></p>
</div>

<script>
    async function init() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            const data = await res.json();
            
            const now = new Date();
            const currentHour = new Date(now.setMinutes(0,0,0)).toISOString();
            
            const prices = data.prices;
            const current = prices.find(p => p.time === currentHour) || prices[0];
            
            // Atjaunojam galveno kartīti
            document.getElementById('price-now').innerText = current.price;
            document.getElementById('status-dot').style.background = current.color;
            document.getElementById('status-text').innerText = current.label + " cena";
            document.getElementById('status-text').style.color = current.color;
            document.getElementById('update-time').innerText = "Atjaunots: " + new Date(data.updatedAt).toLocaleTimeString();

            // Ieteikumi
            let advice = "Var lietot elektroierīces kā parasti.";
            if (current.color === '#22c55e') advice = "✨ Izdevīgs laiks! Mazgā veļu, traukus vai lādē auto!";
            if (current.color === '#ef4444') advice = "🛑 Dārgs laiks! Izslēdz liekās ierīces un pagaidi.";
            document.getElementById('advice-text').innerText = advice;

            // Prognoze
            const upcoming = prices.filter(p => new Date(p.time) >= new Date(currentHour)).slice(1, 7);
            document.getElementById('forecast-list').innerHTML = upcoming.map(p => `
                <div class="hour-row">
                    <span class="hour-time">${new Date(p.time).getHours()}:00</span>
                    <span class="hour-price" style="background: ${p.color}20; color: ${p.color}">${p.price} c/kWh</span>
                </div>
            `).join('');

        } catch (e) {
            document.getElementById('advice-text').innerText = "Kļūda ielādējot datus. Palaidiet robotu GitHub Actions!";
        }
    }
    init();
</script>
</body>
</html>
