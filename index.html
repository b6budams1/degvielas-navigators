<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akciju Navigators Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .product-card { transition: transform 0.2s; }
        .product-card:active { transform: scale(0.98); }
        .store-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 800; }
        .Rimi { background: #fee2e2; color: #dc2626; }
        .Lidl { background: #dbeafe; color: #1e40af; }
        .Maxima { background: #dcfce7; color: #166534; }
    </style>
</head>
<body class="pb-20">

    <!-- Header & Search -->
    <div class="sticky top-0 z-50 p-4 glass border-b border-slate-200">
        <div class="max-w-2xl mx-auto">
            <h1 class="text-2xl font-800 text-slate-900 mb-4 flex items-center gap-2">
                🛍️ <span class="tracking-tight">Akciju<span class="text-blue-600">Navigators</span></span>
            </h1>
            <div class="relative">
                <input type="text" id="q" oninput="draw()" placeholder="Meklēt produktu (piem. piens)" 
                    class="w-full p-4 pl-12 bg-white border border-slate-200 rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <span class="absolute left-4 top-4 opacity-30">🔍</span>
            </div>
        </div>
    </div>

    <!-- Results Grid -->
    <div class="max-w-2xl mx-auto p-4">
        <div id="status" class="text-sm text-slate-500 mb-4 text-center">Ielādē labākos piedāvājumus...</div>
        <div id="list" class="grid grid-cols-2 gap-4">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <!-- Bottom Menu (App style) -->
    <div class="fixed bottom-0 left-0 right-0 p-4 glass border-t border-slate-200 flex justify-around items-center">
        <button onclick="filter('')" class="text-xs font-bold text-blue-600">🏠 VISI</button>
        <button onclick="filter('Rimi')" class="text-xs font-bold text-slate-400">RIMI</button>
        <button onclick="filter('Lidl')" class="text-xs font-bold text-slate-400">LIDL</button>
    </div>

<script>
    let db = [];

    async function init() {
        try {
            const r = await fetch('data.json?v=' + Date.now());
            const d = await r.json();
            db = d.items || [];
            document.getElementById('status').innerText = `Atrastas ${db.length} akcijas • Atjaunots: ${new Date(d.updatedAt).toLocaleTimeString()}`;
            draw();
        } catch (e) {
            document.getElementById('status').innerText = "⚠️ Dati vēl nav gatavi. Lūdzu, pagaidiet...";
        }
    }

    function draw(filterStore = '') {
        const q = document.getElementById('q').value.toLowerCase();
        const container = document.getElementById('list');
        
        const filtered = db.filter(i => 
            (i.name.toLowerCase().includes(q) || i.store.toLowerCase().includes(q)) &&
            (filterStore === '' || i.store === filterStore)
        );

        container.innerHTML = filtered.map(i => `
            <div class="product-card bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="h-32 bg-slate-50 flex items-center justify-center p-2">
                    <img src="${i.img || 'https://via.placeholder.com/150?text=Nav+bildes'}" class="max-h-full object-contain mix-blend-multiply">
                </div>
                <div class="p-3">
                    <span class="store-badge ${i.store}">${i.store}</span>
                    <h3 class="text-sm font-bold text-slate-800 mt-1 line-clamp-2 h-10">${i.name}</h3>
                    <div class="mt-2 flex items-baseline gap-1">
                        <span class="text-xl font-800 text-slate-900">${i.price}</span>
                    </div>
                    <p class="text-[10px] text-slate-400 mt-1">📅 ${i.date}</p>
                </div>
            </div>
        `).join('');
    }

    function filter(s) { draw(s); }
    init();
</script>
</body>
</html>
