name: Update Prices

on:
  schedule:
    - cron: '0 * * * *' # Darbosies katru stundu
  workflow_dispatch: # Atļauj Tev palaist manuāli

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 # Atjaunots uz v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Atjaunots uz v4
        with:
          node-version: '24' # Šis izlabo Tavu kļūdu!

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Run Scraper
        run: node fuel_mvp.js
        env:
          # Šī rinda piespiež GitHub izmantot jauno Node versiju visām darbībām
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git commit -m "Atjaunotas akciju cenas" || exit 0
          git push
